<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <title>Logit Scope</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="title-row">
      <div>
        <h1>Logit Scope</h1>
        <p>Shape sampling probability by candidate rank while the model speaks.</p>
      </div>
      <div id="connection" class="connection">Connecting</div>
    </header>

    <section class="controls panel" aria-label="Sampling controls">
      <label>
        <span>Profile</span>
        <select id="profile">
          <option value="uniform">Uniform</option>
          <option value="exponential" selected>Exponential</option>
          <option value="power">Power</option>
          <option value="half-normal">Half-normal</option>
        </select>
      </label>

      <label class="slider-control">
        <span>Blend <output id="blendValue">0%</output></span>
        <input id="blend" type="range" min="0" max="1" step="0.01" value="0" aria-label="Blend">
      </label>

      <label class="slider-control">
        <span>Concentration <output id="concentrationValue">1.00</output></span>
        <input id="concentration" type="range" min="0.05" max="4" step="0.05" value="1" aria-label="Concentration">
      </label>

      <label>
        <span>Pool</span>
        <select id="candidateCount">
          <option>32</option><option>64</option><option>128</option><option>256</option>
          <option>512</option><option>1024</option><option>2048</option><option>4096</option>
        </select>
      </label>

      <label>
        <span>Seed</span>
        <input id="seed" type="number" min="0" max="4294967295" step="1" value="1234">
      </label>

      <label class="check-control" title="Keep model protocol and end-of-generation tokens at their raw logits">
        <input id="protectControlTokens" type="checkbox" checked>
        <span>Protocol guard</span>
      </label>
    </section>

    <section class="scope panel">
      <div class="scope-heading">
        <div>
          <h2>Sampling probability by candidate rank</h2>
          <p id="scopeCaption">Persistent target profile</p>
        </div>
        <div class="legend" aria-label="Plot legend">
          <span class="target">Target</span>
          <span class="raw">Raw</span>
          <span class="shaped">Shaped</span>
        </div>
      </div>
      <canvas id="plot" aria-label="Rank probability plot"></canvas>
      <div class="metrics">
        <div><span>Pool mass</span><strong id="poolMass">—</strong></div>
        <div><span>JS shift</span><strong id="jsShift">—</strong></div>
        <div><span>Entropy</span><strong id="entropy">—</strong></div>
        <div><span>Peak</span><strong id="peak">—</strong></div>
        <div class="token"><span>Selected token</span><strong id="selectedToken">—</strong></div>
      </div>
    </section>

    <section class="chat panel">
      <pre id="transcript" aria-live="polite">Load a model and start a conversation.</pre>
      <div class="composer">
        <textarea id="message" rows="3" placeholder="Enter a prompt. Ctrl/Cmd+Enter sends."></textarea>
        <div class="actions">
          <button id="clear" class="secondary">Clear</button>
          <button id="stop" class="secondary" disabled>Stop</button>
          <button id="send" class="primary" disabled>Send</button>
        </div>
      </div>
    </section>

    <footer>
      <div id="status">Starting llama.cpp…</div>
      <div id="error" role="alert"></div>
    </footer>
  </main>
  <script type="module" src="/app.js"></script>
</body>
</html>
